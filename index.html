<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PharmaDesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Pharma<span>Desk</span></div>
    <div class="nav-links">
      <button onclick="showPage('search')"    class="active" id="nav-search">Search</button>
      <button onclick="showPage('addstock')"  id="nav-addstock">Add Stock</button>
      <button onclick="showPage('available')" id="nav-available">Available</button>
    </div>
  </nav>


  <!-- PAGE 1 — SEARCH -->
  <div class="page active" id="page-search">

    <div class="search-hero">
      <h1>Find a <span>Medicine</span></h1>
      <p>Search by name to check stock, price and dosage</p>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="e.g. Paracetamol..." autocomplete="off" />
        <button class="clear-btn" id="clear-btn">✕</button>
        <div id="suggestions"></div>
      </div>
    </div>

    <div id="result-area"></div>

  </div>


  <!-- PAGE 2 — ADD STOCK -->
  <div class="page" id="page-addstock">
    <div class="wrap">

      <div class="page-header">
        <h2>Add Stock</h2>
        <p>Register a new medicine or restock existing ones</p>
      </div>

      <!-- NEW MEDICINE FORM -->
      <div class="card">
        <div class="card-title">Register New Medicine</div>
        <form id="add-form">
          <div class="form-grid">

            <div class="form-group full">
              <label>Medicine Name</label>
              <input type="text" id="f-name" placeholder="e.g. Paracetamol 500mg" required />
            </div>

            <div class="form-group">
              <label>Manufacturer</label>
              <input type="text" id="f-mfr" placeholder="e.g. Cipla Ltd." required />
            </div>

            <div class="form-group">
              <label>Batch Number</label>
              <input type="text" id="f-batch" placeholder="e.g. B2024-001" required />
            </div>

            <div class="form-group">
              <label>Category</label>
              <select id="f-cat">
                <option>Analgesic</option>
                <option>Antibiotic</option>
                <option>Antacid</option>
                <option>Antihistamine</option>
                <option>Antidiabetic</option>
                <option>Cardiovascular</option>
                <option>Vitamin / Supplement</option>
                <option>Other</option>
              </select>
            </div>

            <div class="form-group">
              <label>Quantity</label>
              <input type="number" id="f-qty" placeholder="e.g. 200" min="1" required />
            </div>

            <div class="form-group">
              <label>Price per unit (₹)</label>
              <input type="number" id="f-price" placeholder="e.g. 15" step="0.01" min="0" required />
            </div>

            <div class="form-group">
              <label>Expiry Date</label>
              <input type="date" id="f-expiry" required />
            </div>

            <div class="form-group">
              <label>Manufacturing Date</label>
              <input type="date" id="f-mfgdate" />
            </div>

            <div class="form-group full">
              <label>Dosage / Intake Instructions</label>
              <textarea id="f-intake" placeholder="e.g. Take 1–2 tablets every 4–6 hours with water..."></textarea>
            </div>

          </div>
          <hr class="divider" />
          <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Save Medicine</button>
            <button type="reset"  class="btn btn-outline">Reset</button>
          </div>
        </form>
      </div>

      <!-- QUICK RESTOCK TABLE -->
      <div class="card">
        <div class="card-title">Quick Restock — Low &amp; Out of Stock</div>
        <table>
          <thead>
            <tr>
              <th>Medicine</th>
              <th>Batch</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Add Units</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="restock-table"></tbody>
        </table>
      </div>

    </div>
  </div>


  <!-- PAGE 3 — AVAILABLE MEDICINES -->
  <div class="page" id="page-available">
    <div class="wrap-wide">

      <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <h2>Available Medicines</h2>
          <p>Browse and filter the full inventory</p>
        </div>
        <button class="btn btn-primary" onclick="showPage('addstock')">+ Add Medicine</button>
      </div>

      <div class="stat-row" id="stat-row"></div>

      <div class="filter-row">
        <input type="text" id="search-filter" placeholder="Search by name..." />
        <select id="cat-filter">
          <option value="">All Categories</option>
          <option>Analgesic</option>
          <option>Antibiotic</option>
          <option>Antacid</option>
          <option>Antihistamine</option>
          <option>Antidiabetic</option>
          <option>Cardiovascular</option>
          <option>Vitamin / Supplement</option>
        </select>
        <button class="filter-btn active" data-f="all">All</button>
        <button class="filter-btn" data-f="in">In Stock</button>
        <button class="filter-btn" data-f="low">Low Stock</button>
        <button class="filter-btn" data-f="out">Out of Stock</button>
      </div>

      <div class="med-grid" id="med-grid"></div>

    </div>
  </div>


  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
